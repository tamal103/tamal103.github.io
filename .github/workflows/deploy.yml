name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Static Site
        # This environment variable forces TanStack/Vinxi to create an index.html
        run: bun run build
        env:
          NITRO_PRESET: github-pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # When using the github-pages preset, files move to this specific folder
          path: './.output/public'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4