name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Prepare static files
        # This part ensures that if there's no index.html in the root of the folder, 
        # we try to find it or use a 404 fallback for routing.
        run: |
          if [ -d "dist/client" ]; then
            cp dist/client/index.html dist/client/404.html || true
            echo "Using dist/client"
          elif [ -d ".output/public" ]; then
            cp .output/public/index.html .output/public/404.html || true
            echo "Using .output/public"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # We use a conditional path check
          path: './dist/client'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4