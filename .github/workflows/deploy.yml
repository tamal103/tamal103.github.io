name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build
        env:
          # Force the static preset during the CI build
          NITRO_PRESET: github-pages

      - name: Locate and Move Static Files
        run: |
          mkdir -p final_site
          
          # Check all possible output locations for TanStack/Vinxi
          if [ -d ".output/public" ]; then
            cp -r .output/public/* final_site/
          elif [ -d "dist/client" ]; then
            cp -r dist/client/* final_site/
          fi

          # Ensure index.html exists. If it's missing, the site will 404.
          if [ ! -f "final_site/index.html" ]; then
            echo "Searching for hidden index.html..."
            find . -name "index.html" -not -path "./node_modules/*" -exec cp {} final_site/ \;
          fi

          # Add 404.html so refreshing internal pages doesn't break
          cp final_site/index.html final_site/404.html || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './final_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4